name: CI
# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  # Cancel previous actions from the same PR or branch except 'main' branch.
  # See https://docs.github.com/en/actions/using-jobs/using-concurrency and https://docs.github.com/en/actions/learn-github-actions/contexts for more info.
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  test:
    uses: bazel-contrib/.github/.github/workflows/bazel.yaml@e5ab8fc4c23cb13783fad499e8bd865fd9f6d669 # v7.6.0
    with:
      bazel_versions: |
        [
          "7.x",
          "8.x",
          "9.x"
        ]
      folders: |
        [
          ".",
          "e2e/smoke"
        ]
      exclude: |
        [
          {"folder": ".", "bzlmodEnabled": false}
        ]
      exclude_windows: true
      cache_save: ${{ github.event_name != 'pull_request' }}
      bazel_test_command: bazel test --config=ci //...
  test-windows-vs2026:
    runs-on: windows-2025-vs2026
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || contains(github.head_ref, 'windows')
    strategy:
      fail-fast: false
      matrix:
        bazelversion:
          - 7.x
          - 8.x
          - 9.x
        folder:
          - .
          - e2e/smoke
        bzlmodEnabled:
          - true
          - false
        exclude:
          - folder: .
            bzlmodEnabled: false
          - bazelversion: 9.x
            bzlmodEnabled: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          disk-cache: bazel-${{ matrix.bazelversion }}
          cache-save: ${{ github.event_name != 'pull_request' }}
          bazelrc: |
            common --announce_rc
            common --color=yes
            common --enable_bzlmod=${{ matrix.bzlmodEnabled }}
      - name: Configure bazelrc --enable_workspace
        working-directory: ${{ matrix.folder }}
        if: ${{ !matrix.bzlmodEnabled }}
        run: echo "common --enable_workspace" >> .bazelrc
      - name: Configure Bazel version
        working-directory: ${{ matrix.folder }}
        run: |
          echo "${{ matrix.bazelversion }}" > .bazelversion
          bazel version
      - name: Test
        working-directory: ${{ matrix.folder }}
        run: bazel test --config=ci //...
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
  # For branch protection settings, this job provides a "stable" name that can be used to gate PR merges
  # on "all matrix jobs were successful".
  conclusion:
    needs: [test, test-windows-vs2026, pre-commit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3
      # Note: possible conclusion values:
      # https://github.com/technote-space/workflow-conclusion-action/blob/main/src/constant.ts
      - name: report success
        if: ${{ env.WORKFLOW_CONCLUSION == 'success' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 0
      - name: report failure
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 1
